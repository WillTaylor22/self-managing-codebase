  - type: url
    name: linear
    url: https://mcp.linear.app/mcp
  - type: url
    name: github
    url: https://api.githubcopilot.com/mcp/
  - type: url
    name: vercel
    url: https://mcp.vercel.com
  - type: url
    name: sentry
    url: https://mcp.sentry.dev/mcp
